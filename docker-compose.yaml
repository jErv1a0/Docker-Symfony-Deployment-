services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    environment:
      APP_ENV: prod
      APP_DEBUG: 0
      DEFAULT_URI: http://localhost
      APP_SECRET: ${APP_SECRET:-ChangeThisSecretInProduction}
      DB_HOST: database
      DB_PORT: 3306
      # Prefer DATABASE_URL from .env, but keep a local fallback for compose runs
      DATABASE_URL: ${DATABASE_URL:-mysql://root:${MYSQL_ROOT_PASSWORD:-root}@database:3306/${MYSQL_DATABASE:-app}?serverVersion=8.0.32&charset=utf8mb4}
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./:/var/www/html
    networks:
      - backend

  database:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-app}
      # For local development we set a root password so the app can connect reliably
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "3310:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - backend

volumes:
  db_data:

networks:
  backend:
    driver: bridge
