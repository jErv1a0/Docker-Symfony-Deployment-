services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_ENV: prod
      APP_DEBUG: 0
      APP_SECRET: ${APP_SECRET:-ChangeThisSecretInProduction}
      DB_HOST: database
      DB_PORT: 3306
      DATABASE_URL: mysql://${MYSQL_USER:-app}:${MYSQL_PASSWORD:-ChangeMe!}@database:3306/${MYSQL_DATABASE:-app}?serverVersion=8.0.32&charset=utf8mb4
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./:/var/www/html
    networks:
      - backend

  web:
    image: nginx:1.27-alpine
    depends_on:
      - app
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx-main.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    networks:
      - backend

  database:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-app}
      MYSQL_USER: ${MYSQL_USER:-app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ChangeMe!}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-RootChangeMe!}
    ports:
      - "3310:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - backend

  phpmyadmin:
    image: phpmyadmin:5.2-apache
    depends_on:
      database:
        condition: service_healthy
    environment:
      PMA_HOST: database
      PMA_USER: ${MYSQL_USER:-app}
      PMA_PASSWORD: ${MYSQL_PASSWORD:-ChangeMe!}
      PMA_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-RootChangeMe!}
      PMA_DATABASE: ${MYSQL_DATABASE:-app}
    ports:
      - "8081:80"
    restart: unless-stopped
    networks:
      - backend

volumes:
  db_data:

networks:
  backend:
    driver: bridge
